name: BlinkMore
options:
  bundleIdPrefix: com.oxremy
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.4"
settings:
  base:
    SWIFT_VERSION: "5"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    CODE_SIGN_ENTITLEMENTS: BlinkMore/BlinkMore.entitlements
    INFOPLIST_FILE: BlinkMore/Info.plist
    GENERATE_INFOPLIST_FILE: false
    PRODUCT_BUNDLE_IDENTIFIER: com.oxremy.BlinkMore
    PRODUCT_NAME: BlinkMore
targets:
  BlinkMore:
    type: application
    platform: macOS
    sources:
      - path: BlinkMore
        excludes:
          - "Preview Content/**"
          - "**/.DS_Store"
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: BlinkMore/BlinkMore.entitlements
        INFOPLIST_FILE: BlinkMore/Info.plist
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: BlinkMore/BlinkMore.entitlements
